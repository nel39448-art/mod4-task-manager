server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Reenviar las llamadas a la API hacia el backend dentro de la red de Compose.
    # 'backend' es el nombre del servicio; nunca localhost.
    location /tareas {
        proxy_pass http://backend:4000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Servir la SPA: cualquier otra ruta cae en index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
