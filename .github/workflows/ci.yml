name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      confirmacion:
        description: 'Escribe DEPLOY para confirmar el despliegue a produccion'
        required: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build

  pruebas:
    name: Pruebas unitarias y cobertura
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx vitest run --coverage

  e2e:
    name: Pruebas E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test

  migraciones:
    name: Migraciones y Seeds
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      # PostgreSQL efímero de CI: credenciales fijas de prueba (no secretas),
      # porque solo existe durante esta ejecución en una VM descartable.
      DATABASE_URL: postgresql://testuser:testpass@localhost:5432/testdb
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Verificar secreto DATABASE_URL (sin exponerlo)
        env:
          SECRET_DB_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -n "$SECRET_DB_URL" ]; then
            echo "Secret DATABASE_URL presente y enmascarado por GitHub."
          else
            echo "ADVERTENCIA: el secret DATABASE_URL no está configurado."
          fi
      - run: npx prisma migrate deploy
      - run: npx prisma db seed

  deploy-staging:
    name: Deploy a Staging
    needs: [lint, build, pruebas, e2e, migraciones]
    # Solo tras un push real a main (es decir, después de un merge), y solo
    # cuando el despliegue esté habilitado (variable de repo DEPLOY_ENABLED).
    # Mientras DEPLOY_ENABLED no sea 'true', este job queda saltado y no rompe
    # el pipeline aunque todavía no exista el proyecto de Railway ni el token.
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && vars.DEPLOY_ENABLED == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Instalar Railway CLI
        run: npm install -g @railway/cli
      - name: Desplegar a Railway (staging)
        run: railway up --service backend --environment staging --ci
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  deploy-produccion:
    name: Deploy a Producción (manual)
    # Nunca automático: solo cuando alguien lo dispara a mano y escribe DEPLOY.
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.confirmacion == 'DEPLOY' && vars.DEPLOY_ENABLED == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Instalar Railway CLI
        run: npm install -g @railway/cli
      - name: Desplegar a Railway (produccion)
        run: railway up --service backend --environment production --ci
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
